name: Gauge reading

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  read:
    runs-on: ubuntu-latest

    env:
      SPYPOINT_USERNAME: ${{ secrets.SPYPOINT_USERNAME }}
      SPYPOINT_PASSWORD: ${{ secrets.SPYPOINT_PASSWORD }}
      SPYPOINT_CAMERA_ID: ${{ secrets.SPYPOINT_CAMERA_ID }}
      DB_PATH: ./readings.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-segformer-b0-${{ runner.os }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new photos and run segmentation
        run: python fetch_and_read.py

      - name: Export data.json
        run: python export_data.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add readings.db data.json current.json
          git diff --cached --quiet || git commit -m "Auto: gauge reading $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
