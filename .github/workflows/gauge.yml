name: Gauge reading

on:
  schedule:
    - cron: '21 9 * * *'    # 09:21 UTC = 01:21 PST (10 min after 01:11 upload)
    - cron: '21 17 * * *'   # 17:21 UTC = 09:21 PST (10 min after 09:11 upload)
    - cron: '21 1 * * *'    # 01:21 UTC = 17:21 PST (10 min after 17:11 upload)
  workflow_dispatch:           # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  read:
    runs-on: ubuntu-latest

    env:
      SPYPOINT_USERNAME: ${{ secrets.SPYPOINT_USERNAME }}
      SPYPOINT_PASSWORD: ${{ secrets.SPYPOINT_PASSWORD }}
      SPYPOINT_CAMERA_ID: ${{ secrets.SPYPOINT_CAMERA_ID }}
      DB_PATH: ./readings.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-segformer-b0-${{ runner.os }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new photos and run segmentation
        run: python fetch_and_read.py

      - name: Fetch rainfall data
        run: python fetch_rain.py

      - name: Export data.json
        run: python export_data.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add readings.db data.json current.json rain.json
          git diff --cached --quiet || git commit -m "Auto: gauge reading $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
